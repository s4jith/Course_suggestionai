<app-page-header title="Subjects" subtitle="Manage academic subjects">
  <button mat-flat-button color="primary" disabled>
    <mat-icon>add</mat-icon> New Subject
  </button>
</app-page-header>

<mat-card class="table-card">
  <mat-card-content>
    <div class="toolbar">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search subjects</mat-label>
        <input matInput [formControl]="searchCtrl" placeholder="Name or code..." />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>

    @if (loading) {
      <div class="loading-row">
        <mat-spinner diameter="40" />
      </div>
    } @else if (subjects.length === 0) {
      <div class="empty-state">
        <mat-icon>menu_book</mat-icon>
        <p>No subjects found.</p>
      </div>
    } @else {
      <table mat-table [dataSource]="subjects" class="subjects-table">
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let s"><strong>{{ s.code }}</strong></td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let s">{{ s.name }}</td>
        </ng-container>

        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef>Department</th>
          <td mat-cell *matCellDef="let s">{{ s.department }}</td>
        </ng-container>

        <ng-container matColumnDef="semester">
          <th mat-header-cell *matHeaderCellDef>Semester</th>
          <td mat-cell *matCellDef="let s">{{ s.semester }}</td>
        </ng-container>

        <ng-container matColumnDef="total_hours">
          <th mat-header-cell *matHeaderCellDef>Hours</th>
          <td mat-cell *matCellDef="let s">{{ s.total_hours }}h</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let s">
            <button mat-icon-button color="warn" (click)="deactivate(s.id)" title="Deactivate">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        [length]="total"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 25]"
        (page)="onPage($event)"
        showFirstLastButtons
      />
    }
  </mat-card-content>
</mat-card>
